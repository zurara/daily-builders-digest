<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta property="og:title" content="Daily Builders Digest · 2026-03-17 · 产品">
<title>Daily Builders Digest · 2026-03-17 · 产品</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>:root{--bg:#f2f0ea;--ink:#0c0c0c;--red:#dd1111;--mid:#888;--light:#d8d6d0;}*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--bg);color:var(--ink);font-family:Inter,sans-serif;max-width:800px;margin:0 auto;padding:60px 24px 100px;}.hed{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,8vw,80px);line-height:.95;margin-bottom:24px;}.hed span{color:#004488;}.meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mid);letter-spacing:.12em;margin-bottom:32px;}audio{width:100%;accent-color:var(--red);margin-bottom:24px;display:block;}.note{font-size:14px;color:var(--mid);line-height:1.7;border-left:2px solid var(--light);padding-left:16px;}</style>
<style id="ep-nav-css">
#ep-nav-bar{position:fixed;bottom:0;left:0;right:0;background:#0c0c0c;border-top:2px solid #dd1111;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;z-index:200;font-family:'JetBrains Mono',monospace;font-size:11px;padding-bottom:max(10px,env(safe-area-inset-bottom,10px));gap:8px;}
.epnav-home{color:#f2f0ea;text-decoration:none;letter-spacing:.08em;flex-shrink:0;}
.epnav-home:hover{color:#dd1111;}
.epnav-center{display:flex;align-items:center;gap:10px;}
.epnav-btn{color:#666;text-decoration:none;letter-spacing:.06em;transition:color .15s;flex-shrink:0;}
.epnav-btn:hover{color:#dd1111;}
.epnav-btn.off{opacity:.25;pointer-events:none;}
.epnav-sep{color:#333;flex-shrink:0;}
.epnav-info{color:#555;font-size:10px;letter-spacing:.1em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@media(max-width:420px){.epnav-info{display:none;}}
</style>
</head><body>
<p class="meta">2026-03-17 · DAILY BUILDERS DIGEST</p>
<h1 class="hed">今日<span>Product</span><br>快报</h1>
<audio controls src="2026-03-17.mp3"></audio>
<p class="note">本期文字版内容暂未归档，请收听上方音频。</p>
<!-- ── EPISODE NAV ── -->
<div id="ep-nav-bar">
  <a href="/" class="epnav-home">← 首页</a>
  <div class="epnav-center">
    <a id="epnav-prev" href="#" class="epnav-btn off">‹ 上一期</a>
    <span class="epnav-sep">·</span>
    <span id="epnav-info" class="epnav-info"></span>
    <span class="epnav-sep">·</span>
    <a id="epnav-next" href="#" class="epnav-btn off">下一期 ›</a>
  </div>
</div>
<script>
(async()=>{try{
  const f=await(await fetch('/feed.json')).json();
  const m=document.title.match(/(\d{4}-\d{2}-\d{2})/);if(!m)return;
  const idx=f.findIndex(e=>e.date===m[1]);if(idx<0)return;
  const ep=f[idx],older=f[idx+1],newer=f[idx-1];
  const i=document.getElementById('epnav-info'),p=document.getElementById('epnav-prev'),n=document.getElementById('epnav-next');
  if(i)i.textContent=ep.date+(ep.topic?' · '+ep.topic:'');
  if(p&&older){p.href='/'+older.html;p.classList.remove('off');}
  if(n&&newer){n.href='/'+newer.html;n.classList.remove('off');}
}catch(e){console.warn('nav',e);}})();
</script>
</body></html>
